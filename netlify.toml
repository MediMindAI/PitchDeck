# Netlify config for MediMind pitch deck
# Serves the HTML deck at the root URL.

[build]
  publish = "."

[[redirects]]
  from = "/"
  to = "/MediMind-PitchDeck.html"
  status = 200

# Long cache on screenshot assets (filenames are stable)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
